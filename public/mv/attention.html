let lastExTitle='';
function showExplain(title,html){
  const ex=document.getElementById('explain');
  if(title===lastExTitle)return;
  lastExTitle=title;
  ex.querySelector('h4').textContent=title;
  ex.querySelector('.body').innerHTML=html;
  ex.classList.remove('on');
  void ex.offsetWidth;
  ex.classList.add('on');
}

// 1. Token Embeddings — words float as glowing orbs with sine-wave position encoding
function drawTokenEmbeddings(ct,W,H){
  const tokens=['まぶた','光','星座','ニューロン','発火','結びつく','予感','名前','世界','予測'];
  const t=(ct-11)/23;
  cx2.globalAlpha=.6;
  for(let i=0;i<tokens.length;i++){
    const x=W*.1+((i*W*.08+ct*20)%(W*.85));
    const y=H*.3+Math.sin(ct*.5+i*1.7)*H*.15;
    // Positional encoding sine wave trail
    cx2.strokeStyle=`hsla(${200+i*15},80%,60%,.2)`;
    cx2.lineWidth=1;cx2.beginPath();
    for(let dx=-50;dx<50;dx++){
      const py=y+Math.sin((x+dx)*.02+i)*8;
      dx===-50?cx2.moveTo(x+dx,py):cx2.lineTo(x+dx,py);
    }
    cx2.stroke();
    // Token orb
    cx2.fillStyle=`hsla(${200+i*15},80%,70%,.4)`;
    cx2.shadowColor=`hsla(${200+i*15},80%,70%,.6)`;cx2.shadowBlur=15;
    cx2.beginPath();cx2.arc(x,y,12+Math.sin(ct*2+i)*3,0,Math.PI*2);cx2.fill();
    // Text
    cx2.shadowBlur=0;cx2.fillStyle=`rgba(255,255,255,.6)`;
    cx2.font='10px monospace';cx2.textAlign='center';
    cx2.fillText(tokens[i],x,y+25);
  }
  cx2.globalAlpha=1;cx2.shadowBlur=0;
}

// 2. QKV — three colored streams flowing and computing
function drawQKV(ct,W,H){
  const t=(ct-34)/11;
  const labels=[{name:'Query',color:'#FF6B9D',y:.3},{name:'Key',color:'#00FFFF',y:.5},{name:'Value',color:'#C084FC',y:.7}];
  cx2.globalAlpha=.5;
  for(const {name,color,y:yp} of labels){
    const baseY=H*yp;
    cx2.strokeStyle=color;cx2.lineWidth=2;cx2.shadowColor=color;cx2.shadowBlur=10;
    cx2.beginPath();
    for(let x=0;x<W;x+=3){
      const progress=Math.min(1,t*2-x/W*.5);
      if(progress<=0)continue;
      const y=baseY+Math.sin(x*.02+ct*3)*20*progress;
      x===0?cx2.moveTo(x,y):cx2.lineTo(x,y);
    }
    cx2.stroke();
    // Label
    cx2.shadowBlur=0;cx2.fillStyle=color;cx2.font='bold 14px monospace';
    cx2.fillText(name,30,baseY-30);
    // Dots flowing along the stream
    for(let d=0;d<5;d++){
      const dx=((ct*80+d*W/5)%W);
      const dy=baseY+Math.sin(dx*.02+ct*3)*20;
      cx2.beginPath();cx2.arc(dx,dy,4,0,Math.PI*2);cx2.fillStyle=color;cx2.fill();
    }
  }
  cx2.globalAlpha=1;cx2.shadowBlur=0;
}

// 3. ATTENTION MATRIX — the iconic softmax visualization
function drawAttentionMatrix(ct,W,H){
  const size=Math.min(W,H)*.35;
  const ox=W/2-size/2,oy=H/2-size/2;
  const n=8; // 8x8 attention grid
  const cellW=size/n,cellH=size/n;
  const t=ct*.3;
  cx2.globalAlpha=.4;
  // Draw attention weights as colored cells
  for(let i=0;i<n;i++){
    for(let j=0;j<n;j++){
      // Attention weight = softmax-like pattern (diagonal + some off-diagonal)
      const diag=Math.exp(-Math.abs(i-j)*.8);
      const dynamic=Math.sin(t+i*j*.5)*.3+.3;
      const weight=Math.min(1,diag*.6+dynamic*.4);
      const hue=200+weight*120; // blue→pink based on weight
      cx2.fillStyle=`hsla(${hue},80%,55%,${weight*.7})`;
      cx2.shadowColor=`hsla(${hue},80%,55%,.5)`;cx2.shadowBlur=weight*8;
      cx2.fillRect(ox+j*cellW+1,oy+i*cellH+1,cellW-2,cellH-2);
    }
  }
  cx2.shadowBlur=0;
  // Token labels
  const toks=['アテン','ション','ください','君の','名前で','世界は','予測を','始める'];
  cx2.fillStyle='rgba(255,255,255,.5)';cx2.font='9px sans-serif';
  for(let i=0;i<n;i++){
    cx2.save();cx2.translate(ox+i*cellW+cellW/2,oy-5);cx2.textAlign='center';
    cx2.fillText(toks[i],0,0);cx2.restore();
    cx2.fillText(toks[i],ox-45,oy+i*cellH+cellH/2+3);
  }
  // "Attention Is All You Need" floating text
  cx2.globalAlpha=.15+Math.sin(ct)*.1;
  cx2.fillStyle='#00FFFF';cx2.font='italic 11px monospace';cx2.textAlign='center';
  cx2.fillText('Attention Is All You Need — Vaswani et al., 2017',W/2,oy+size+25);
  cx2.globalAlpha=1;
}

// 4. Multi-Head — parallel attention streams
function drawMultiHead(ct,W,H){
  const heads=8;
  cx2.globalAlpha=.4;
  for(let h=0;h<heads;h++){
    const hue=h*45;
    const baseY=H*.15+h*(H*.09);
    cx2.strokeStyle=`hsla(${hue},70%,60%,.6)`;cx2.lineWidth=1.5;
    cx2.shadowColor=`hsla(${hue},70%,60%,.4)`;cx2.shadowBlur=6;
    cx2.beginPath();
    for(let x=0;x<W;x+=4){
      const y=baseY+Math.sin(x*.01+ct*2+h*2)*15+Math.cos(x*.025+ct+h)*10;
      x===0?cx2.moveTo(x,y):cx2.lineTo(x,y);
    }
    cx2.stroke();
    cx2.shadowBlur=0;cx2.fillStyle=`hsla(${hue},70%,60%,.4)`;
    cx2.font='8px monospace';cx2.fillText(`head_${h}`,5,baseY-8);
  }
  // Concat arrow at right
  cx2.strokeStyle='rgba(255,255,255,.3)';cx2.lineWidth=2;
  cx2.beginPath();cx2.moveTo(W*.85,H*.15);cx2.lineTo(W*.92,H*.5);cx2.lineTo(W*.85,H*.85);cx2.stroke();
  cx2.fillStyle='rgba(255,255,255,.4)';cx2.font='10px monospace';
  cx2.fillText('Concat + Linear',W*.86,H*.5);
  cx2.globalAlpha=1;cx2.shadowBlur=0;
}

// 5. Embedding Space — words as dots in 2D projected space
function drawEmbeddingSpace(ct,W,H){
  const words=[
    // 恋愛クラスタ（左上）
    {t:'笑顔',x:.25,y:.25,c:'#FF6B9D'},{t:'キス',x:.3,y:.2,c:'#FF8FA3'},
    {t:'胸',x:.22,y:.32,c:'#FF6B9D'},{t:'温度',x:.35,y:.3,c:'#FF8FA3'},
    // AI/数学クラスタ（右）
    {t:'勾配',x:.7,y:.55,c:'#00FFFF'},{t:'最適化',x:.75,y:.5,c:'#06B6D4'},
    {t:'損失',x:.65,y:.6,c:'#00FFFF'},{t:'逆伝播',x:.72,y:.62,c:'#06B6D4'},
    // 脳科学クラスタ（中央）
    {t:'ドーパミン',x:.5,y:.35,c:'#FFD700'},{t:'ニューロン',x:.52,y:.42,c:'#F59E0B'},
    {t:'シナプス',x:.48,y:.48,c:'#FFD700'},{t:'LTP',x:.55,y:.3,c:'#F59E0B'},
    // 曲の核心（間）
    {t:'予測誤差',x:.6,y:.4,c:'#C084FC'},{t:'潜在空間',x:.45,y:.55,c:'#A855F7'},
    {t:'埋め込み',x:.38,y:.5,c:'#C084FC'},{t:'再生',x:.42,y:.45,c:'#A855F7'},
  ];
  cx2.globalAlpha=.5;
  // Draw connections between nearby words
  for(let i=0;i<words.length;i++){
    for(let j=i+1;j<words.length;j++){
      const dx=words[i].x-words[j].x,dy=words[i].y-words[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<.2){
        cx2.strokeStyle=`rgba(255,255,255,${(.2-dist)*2})`;cx2.lineWidth=.5;
        cx2.beginPath();
        cx2.moveTo(words[i].x*W,words[i].y*H);
        cx2.lineTo(words[j].x*W,words[j].y*H);cx2.stroke();
      }
    }
  }
  // Draw words as orbs
  const drift=ct*.003;
  for(const w of words){
    const x=w.x*W+Math.sin(ct+w.x*10)*15;
    const y=w.y*H+Math.cos(ct*.7+w.y*8)*10;
    cx2.fillStyle=w.c;cx2.shadowColor=w.c;cx2.shadowBlur=12;
    cx2.beginPath();cx2.arc(x,y,6,0,Math.PI*2);cx2.fill();
    cx2.shadowBlur=0;cx2.fillStyle='rgba(255,255,255,.6)';cx2.font='10px sans-serif';cx2.textAlign='center';
    cx2.fillText(w.t,x,y-12);
  }
  cx2.textAlign='left';cx2.globalAlpha=1;cx2.shadowBlur=0;
}

// 6. Backprop — gradient flowing backward through network
function drawBackprop(ct,W,H){
  const layers=6;const nodesPerLayer=5;
  cx2.globalAlpha=.4;
  const t=(ct-103)/11;
  for(let l=0;l<layers;l++){
    const x=W*.15+l*(W*.7/(layers-1));
    for(let n=0;n<nodesPerLayer;n++){
      const y=H*.2+n*(H*.6/(nodesPerLayer-1));
      // Node
      const active=Math.sin(ct*3+l+n)>.2;
      cx2.fillStyle=active?'rgba(255,107,157,.6)':'rgba(0,255,255,.3)';
      cx2.shadowColor=active?'#FF6B9D':'#00FFFF';cx2.shadowBlur=active?10:4;
      cx2.beginPath();cx2.arc(x,y,5,0,Math.PI*2);cx2.fill();
      // Backward gradient arrows
      if(l>0){
        const px=W*.15+(l-1)*(W*.7/(layers-1));
        for(let pn=0;pn<nodesPerLayer;pn++){
          const py=H*.2+pn*(H*.6/(nodesPerLayer-1));
          const grad=Math.abs(Math.sin(ct*2+l*pn))*.5;
          cx2.strokeStyle=`rgba(255,107,157,${grad*.3})`;cx2.lineWidth=grad*2;
          cx2.beginPath();cx2.moveTo(x,y);cx2.lineTo(px,py);cx2.stroke();
        }
      }
    }
    cx2.shadowBlur=0;cx2.fillStyle='rgba(255,255,255,.3)';cx2.font='8px monospace';
    cx2.fillText(`Layer ${l}`,x-15,H*.88);
  }
  // "∇Loss" label flowing right to left
  const arrowX=W*.85-((ct-103)*30%W);
  cx2.fillStyle='rgba(255,107,157,.6)';cx2.font='bold 12px monospace';
  cx2.fillText('∇Loss →',arrowX,H*.12);
  cx2.globalAlpha=1;cx2.shadowBlur=0;
}

// 7. Transformer Stack — layers building up
function drawTransformerStack(ct,W,H){
  const layers=6;
  const t=(ct-141)/24;
  const visibleLayers=Math.min(layers,Math.floor(t*layers*1.5)+1);
  cx2.globalAlpha=.35;
  for(let l=0;l<visibleLayers;l++){
    const y=H*.8-l*(H*.1);
    const w=W*.5,x=W*.25;
    // Layer block
    const hue=200+l*25;
    cx2.fillStyle=`hsla(${hue},60%,40%,.4)`;
    cx2.strokeStyle=`hsla(${hue},60%,60%,.6)`;cx2.lineWidth=1;
    cx2.fillRect(x,y,w,H*.07);cx2.strokeRect(x,y,w,H*.07);
    // Label
    cx2.fillStyle=`hsla(${hue},60%,80%,.8)`;cx2.font='10px monospace';cx2.textAlign='center';
    const labels=['Embedding + PE','Self-Attention','Add & Norm','Feed-Forward','Add & Norm','Output Softmax'];
    cx2.fillText(labels[l]||`Layer ${l}`,W/2,y+H*.04+3);
    // Data flowing upward
    for(let d=0;d<3;d++){
      const dx=x+w*.25+d*w*.25;
      const dy=y+((ct*40+d*20)%(H*.07));
      cx2.fillStyle=`hsla(${hue},80%,70%,.5)`;
      cx2.beginPath();cx2.arc(dx,dy,2,0,Math.PI*2);cx2.fill();
    }
  }
  cx2.textAlign='left';cx2.globalAlpha=1;
}

// 8. Full Model — everything combined at low opacity
function drawFullModel(ct,W,H){
  // Mini attention matrix top-right
  const ms=Math.min(W,H)*.18,mx=W*.75,my=H*.1;
  cx2.globalAlpha=.25;
  for(let i=0;i<6;i++){for(let j=0;j<6;j++){
    const w=Math.sin(ct*.5+i*j)*.5+.5;
    cx2.fillStyle=`hsla(${200+w*100},70%,55%,${w*.5})`;
    cx2.fillRect(mx+j*(ms/6),my+i*(ms/6),ms/6-1,ms/6-1);
  }}
  // Flowing tokens across bottom
  const toks='Q K V Attention Softmax MultiHead FFN LayerNorm Embedding Output'.split(' ');
  cx2.fillStyle='rgba(0,255,255,.2)';cx2.font='9px monospace';
  for(let i=0;i<toks.length;i++){
    const x=((ct*25+i*120)%(W+200))-100;
    cx2.fillText(toks[i],x,H*.92);
  }
  cx2.globalAlpha=1;
}

// 9. Heartbeat sync — two waves merging
function drawHeartbeatSync(ct,W,H){
  const t=ct-210;
  cx2.globalAlpha=.5;
  cx2.lineWidth=2;
  // Human heartbeat (warm red)
  cx2.strokeStyle='#FF6B9D';cx2.shadowColor='#FF6B9D';cx2.shadowBlur=6;
  cx2.beginPath();
  for(let x=0;x<W;x+=2){
    const beat=Math.exp(-Math.pow((x/W*4+t*2)%4-1,2)*8)*30;
    const y=H*.45+beat*Math.sin((x/W*4+t*2)%4*Math.PI);
    x===0?cx2.moveTo(x,y):cx2.lineTo(x,y);
  }
  cx2.stroke();
  // Digital heartbeat (cyan)
  cx2.strokeStyle='#00FFFF';cx2.shadowColor='#00FFFF';
  cx2.beginPath();
  const merge=Math.min(1,t/20); // gradually merge over 20s
  for(let x=0;x<W;x+=2){
    const beat=Math.exp(-Math.pow((x/W*4+t*2+.1*(1-merge))%4-1,2)*8)*30;
    const y=H*.55*(1-merge)+H*.45*merge+beat*Math.sin((x/W*4+t*2)%4*Math.PI);
    x===0?cx2.moveTo(x,y):cx2.lineTo(x,y);
  }
  cx2.stroke();
  cx2.shadowBlur=0;cx2.globalAlpha=1;
}

// Canvas + particles
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const P=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;rsz2();}
rsz();addEventListener('resize',rsz);
function sp(x,y,n,c,sz){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=1+Math.random()*5;P.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,l:1,c,s:sz||2+Math.random()*3});}}
function spCyan(n){sp(innerWidth*(.2+Math.random()*.6),innerHeight*(.3+Math.random()*.4),n,'0,255,255',3);}
function spPink(n){sp(innerWidth*(.2+Math.random()*.6),innerHeight*(.3+Math.random()*.4),n,'255,107,157',4);}
let amb=0;
function drawP(){
  cx.clearRect(0,0,cv.width,cv.height);amb++;
  if(amb%20===0)sp(Math.random()*innerWidth,-10,1,'0,255,255',2);
  if(amb%35===0)sp(Math.random()*innerWidth,-10,1,'192,132,252',3);
  for(let i=P.length-1;i>=0;i--){
    const p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.03;p.vx*=.98;p.l-=.015;
    if(p.l<=0){P.splice(i,1);continue;}
    cx.globalAlpha=p.l*.7;cx.fillStyle=`rgba(${p.c},${p.l})`;cx.shadowColor=`rgba(${p.c},.4)`;cx.shadowBlur=8;
    cx.beginPath();cx.arc(p.x,p.y,p.s*p.l,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;cx.shadowBlur=0;
}

// Visualizer
const vizEl=document.getElementById('viz');const BARS=48;
for(let i=0;i<BARS;i++){const b=document.createElement('div');b.className='vb';b.style.height='2px';vizEl.appendChild(b);}
const vizBars=[...vizEl.children];

// Audio analyser
let actx,anl,lb=0,bth=100;
function setupA(){actx=new(AudioContext||webkitAudioContext)();anl=actx.createAnalyser();anl.fftSize=256;anl.smoothingTimeConstant=.75;const s=actx.createMediaElementSource(audio);s.connect(anl);anl.connect(actx.destination);}

// Effects
function flash(c,d){const f=document.getElementById('fl');f.style.background=c;f.style.opacity='.25';setTimeout(()=>f.style.opacity='0',d||100);}
function shake(i){const d=[(Math.random()-.5)*i*5,(Math.random()-.5)*i*3];document.body.style.transform=`translate(${d[0]}px,${d[1]}px)`;setTimeout(()=>document.body.style.transform='',50);}

function beat(){
  if(!anl)return;const f=new Uint8Array(anl.frequencyBinCount);anl.getByteFrequencyData(f);
  for(let i=0;i<BARS;i++){const idx=Math.floor(i*f.length/BARS);const v=f[idx]/255;vizBars[i].style.height=Math.max(2,v*42)+'px';vizBars[i].style.opacity=.3+v*.5;}
  let b=0;for(let i=0;i<10;i++)b+=f[i];b/=10;
  if(b>bth&&Date.now()-lb>180){lb=Date.now();spCyan(2+Math.floor(b/50));if(b>150)flash('rgba(0,255,255,.08)',40);}
  bth=bth*.94+b*.06*1.3;
}

// Auto-hide transport
let hideT=null;
function showTr(){document.getElementById('transport').style.opacity='1';clearTimeout(hideT);hideT=setTimeout(()=>{if(isPlaying)document.getElementById('transport').style.opacity='0';},3000);}
document.addEventListener('touchstart',showTr);document.addEventListener('mousemove',showTr);

function toggleLang(){
  currentLang = currentLang==='ja'?'en':'ja';
  document.getElementById('lang-label').textContent = currentLang==='ja'?'🇯🇵 JA':'🇺🇸 EN';
  const ct = audio.currentTime;
  audio.src = AUDIO_SRC[currentLang];
  audio.currentTime = ct;
  if(isPlaying) audio.play();
  curLyric = -1;
}

function startPlay(){
  const ov = document.getElementById('start-overlay');
  ov.style.transition='opacity .3s'; ov.style.opacity='0';
  setTimeout(()=>ov.style.display='none',300);
  audio.src = AUDIO_SRC[currentLang];
  setupA();
  audio.play();
  isPlaying = true;
  document.getElementById('btn-play').textContent='⏸';
  requestAnimationFrame(loop);
  setTimeout(()=>{if(isPlaying)document.getElementById('transport').style.opacity='0';},3000);
}

function togglePause(){
  if(isPlaying){audio.pause();isPlaying=false;document.getElementById('btn-play').textContent='▶';}
  else{audio.play();isPlaying=true;document.getElementById('btn-play').textContent='⏸';}
}

function fmt(s){return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

function showLyric(text){
  const el=document.getElementById('k-main');
  el.classList.remove('show');
  void el.offsetWidth;
  el.textContent=text;
  el.classList.add('show');
  // Burst on chorus lines
  if(text.includes('アテンション') || text.includes('attention')){
    flash('rgba(255,107,157,.15)',100);spPink(20);spCyan(15);shake(.4);
  } else if(text.includes('ドーパミン') || text.includes('大丈夫') || text.includes('Dopamine')){
    flash('rgba(0,255,255,.1)',80);spCyan(10);shake(.2);
  }
}

function loop(){
  requestAnimationFrame(loop);
  const ct = audio.currentTime;
  const dur = audio.duration || 234;
  document.getElementById('prog').style.width=(ct/dur*100)+'%';
  document.getElementById('seek-bar').value=ct;
  document.getElementById('time-display').textContent=fmt(ct)+' / '+fmt(dur);

  let si=0;
  for(let i=SCENES.length-1;i>=0;i--){if(ct>=SCENES[i].start){si=i;break;}}
  if(si!==curScene){
    document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
    document.getElementById(SCENES[si].el).classList.add('active');
    curScene=si;
    flash('rgba(192,132,252,.1)',150);spCyan(8);spPink(5);
  }

  const lyrics=getLyrics();
  let li=-1;
  for(let i=lyrics.length-1;i>=0;i--){if(ct>=lyrics[i].t && ct<lyrics[i].t+3.5){li=i;break;}}
  if(li!==curLyric){
    curLyric=li;
    if(li>=0) showLyric(lyrics[li].x);
    else document.getElementById('k-main').classList.remove('show');
  }

  beat();drawP();drawTransformer(ct);
}

audio.addEventListener('ended',()=>{
  isPlaying=false;
  document.getElementById('btn-play').textContent='▶';
  setTimeout(()=>{document.getElementById('end-screen').style.display='block';},1500);
});
