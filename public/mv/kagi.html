<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAGI - スマートホームアプリ MV</title>
<meta property="og:title" content="KAGI — カチャッと開けば、暮らしが変わる">
<meta property="og:description" content="鍵・照明・エアコン、全部てのひらに。スマートホームアプリKAGIの説明MV。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;overflow:hidden;height:100vh;width:100vw}
#mv{position:relative;width:100vw;height:100vh;overflow:hidden}

/* BG */
.bg{position:absolute;inset:0;transition:background 1.5s ease}
.bg-default{background:radial-gradient(ellipse at 50% 40%,#1a1040,#0a0a1a 60%,#000)}
.bg-particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;opacity:0;animation:pfloat linear infinite}
@keyframes pfloat{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.5}90%{opacity:.5}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* Scenes */
.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .7s ease;pointer-events:none}
.scene.active{opacity:1;pointer-events:auto}

/* Phone frame with real screenshot */
.phone{width:240px;height:480px;background:#111;border-radius:40px;border:3px solid #333;position:relative;box-shadow:0 20px 80px rgba(100,50,255,.4),0 0 120px rgba(100,50,255,.1);overflow:hidden;flex-shrink:0}
.phone img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:37px}
.phone-glow{animation:phoneGlow 3s ease infinite}
@keyframes phoneGlow{0%,100%{box-shadow:0 20px 80px rgba(100,50,255,.4)}50%{box-shadow:0 20px 100px rgba(100,50,255,.6),0 0 60px rgba(167,139,250,.2)}}

/* Lifestyle fullscreen bg */
.lifestyle-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s;filter:brightness(.5)}
.lifestyle-bg.active{opacity:1}

/* Tap overlay */
.tap-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.tap-label{font-size:2em;font-weight:900;text-shadow:0 0 30px rgba(167,139,250,.6)}
.tap-sub{font-size:1em;color:#a78bfa;opacity:.8}
.tap-actions-list{display:flex;gap:12px;margin-top:8px}
.tap-action-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 16px;font-size:.85em;backdrop-filter:blur(8px);animation:tapPop .4s ease backwards}
@keyframes tapPop{from{transform:scale(0) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* Product hero */
.product-float{animation:prodFloat 4s ease-in-out infinite}
@keyframes prodFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* Chorus */
.chorus-content{text-align:center}
.chorus-key{font-size:100px;filter:drop-shadow(0 0 50px rgba(167,139,250,.5));animation:keyPulse 2s ease infinite}
@keyframes keyPulse{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.1) rotate(5deg)}}
.chorus-title{font-size:3.5em;font-weight:900;background:linear-gradient(135deg,#a78bfa,#60a5fa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.chorus-sub{font-size:1.1em;color:rgba(167,139,250,.7);margin-top:8px}

/* Outro */
.outro-content{text-align:center}
.outro-logo{font-size:4em;font-weight:900;background:linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:outroShine 3s ease infinite}
@keyframes outroShine{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}

/* Lyrics */
#lyrics{position:absolute;bottom:0;left:0;right:0;padding:20px 16px 36px;background:linear-gradient(transparent,rgba(0,0,0,.95) 50%);text-align:center;z-index:20}
.lyric-line{font-size:clamp(1.1em,3.5vw,1.5em);font-weight:700;opacity:.25;transition:all .4s ease;line-height:1.5;max-width:640px;margin:0 auto}
.lyric-line.active{opacity:1;transform:scale(1.06);text-shadow:0 0 24px rgba(167,139,250,.5)}
.lyric-line.past{opacity:.15;font-size:clamp(.9em,2.5vw,1.1em)}

/* Section label */
#section-label{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:.75em;color:#a78bfa;letter-spacing:5px;text-transform:uppercase;opacity:.5;z-index:20}

/* Controls */
#controls{position:absolute;top:12px;right:12px;z-index:30}
.ctrl-btn{padding:8px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.6);color:#fff;font-size:.85em;cursor:pointer;backdrop-filter:blur(12px);transition:all .2s}
.ctrl-btn:hover{background:rgba(167,139,250,.3);border-color:rgba(167,139,250,.4)}
#progress{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#7c3aed,#a78bfa,#c084fc);z-index:30;transition:width .25s linear}
#time-display{position:absolute;top:14px;left:14px;z-index:30;font-size:.78em;color:#555;font-variant-numeric:tabular-nums}

@media(max-width:600px){
  .phone{width:180px;height:360px;border-radius:30px}
  .phone img{border-radius:27px}
  .tap-label{font-size:1.4em}
  .chorus-key{font-size:60px}
  .chorus-title{font-size:2.2em}
  .tap-actions-list{flex-wrap:wrap;justify-content:center}
}
</style>
  <script defer src="https://enabler-analytics.fly.dev/t.js"></script>
</head>
<body>
<div id="mv">
  <div class="bg bg-default" id="bg"></div>
  <div class="bg-particles" id="particles"></div>
  <div id="section-label"></div>

  <!-- Lifestyle backgrounds (fullscreen, behind everything) -->
  <div class="lifestyle-bg" id="bg-airbnb" style="background-image:url(kagi-assets/airbnb.png)"></div>
  <div class="lifestyle-bg" id="bg-bedroom" style="background-image:url(kagi-assets/bedroom.png)"></div>
  <div class="lifestyle-bg" id="bg-elderly" style="background-image:url(kagi-assets/elderly.png)"></div>
  <div class="lifestyle-bg" id="bg-family" style="background-image:url(kagi-assets/family.png)"></div>

  <!-- Scene: Home (real screenshot) -->
  <div class="scene" id="scene-home" style="flex-direction:column;gap:20px">
    <div class="phone phone-glow">
      <img src="kagi-assets/home.png" alt="KAGI ホーム画面">
    </div>
  </div>

  <!-- Scene: Tap actions (lifestyle bg + overlay) -->
  <div class="scene" id="scene-tap">
    <div class="tap-overlay">
      <div id="tap-icon" style="font-size:64px">🏠</div>
      <div class="tap-label" id="tap-label">帰宅モード</div>
      <div class="tap-sub" id="tap-sub">ワンタップで実行</div>
      <div class="tap-actions-list" id="tap-actions"></div>
    </div>
  </div>

  <!-- Scene: Settings/Devices (real screenshot) -->
  <div class="scene" id="scene-devices" style="flex-direction:column;gap:20px">
    <div class="phone phone-glow">
      <img src="kagi-assets/settings.png" alt="KAGI 設定画面">
    </div>
  </div>

  <!-- Scene: Chorus (product + key) -->
  <div class="scene" id="scene-chorus">
    <div class="chorus-content">
      <div class="chorus-key">🔑</div>
      <div class="chorus-title">KAGI</div>
      <div class="chorus-sub">家ごと まるごと てのひらに</div>
    </div>
  </div>

  <!-- Scene: Product hero -->
  <div class="scene" id="scene-product" style="flex-direction:column;gap:24px">
    <div class="product-float">
      <img src="kagi-assets/product.png" alt="KAGI Hub" style="width:280px;filter:drop-shadow(0 20px 60px rgba(0,255,100,.2))">
    </div>
    <div style="text-align:center">
      <div style="font-size:1.6em;font-weight:800">KAGI Hub</div>
      <div style="font-size:.9em;color:#888;margin-top:4px">全デバイスをひとつに</div>
    </div>
  </div>

  <!-- Scene: Calendar (real screenshot) -->
  <div class="scene" id="scene-calendar" style="flex-direction:column;gap:20px">
    <div class="phone phone-glow">
      <img src="kagi-assets/calendar.png" alt="KAGI カレンダー">
    </div>
  </div>

  <!-- Scene: Dashboard (hand holding phone) -->
  <div class="scene" id="scene-dashboard" style="flex-direction:column;gap:20px">
    <img src="kagi-assets/hand.png" alt="KAGI in hand" style="max-width:min(500px,80vw);border-radius:20px;box-shadow:0 20px 80px rgba(0,0,0,.5)">
  </div>

  <!-- Scene: Outro -->
  <div class="scene" id="scene-outro">
    <div class="outro-content">
      <div style="font-size:80px;margin-bottom:16px">🔑</div>
      <div class="outro-logo">KAGI</div>
      <div style="font-size:1.2em;color:#a78bfa;margin-top:12px">カチャッと開けば、暮らしが変わる</div>
      <div style="font-size:.85em;color:#555;margin-top:16px">Smart Home App</div>
    </div>
  </div>

  <div id="lyrics"></div>
  <div id="progress" style="width:0%"></div>
  <div id="time-display">0:00 / 2:34</div>
  <div id="controls">
    <button class="ctrl-btn" onclick="togglePlay()">▶ 再生</button>
  </div>
</div>

<audio id="audio" src="kagi.mp3" preload="auto"></audio>

<script>
// ===== LYRICS (Whisper small model timestamps + corrected text) =====
const lyrics = [
  {t:0, text:"", section:"Intro", scene:"scene-home"},
  // Verse 1 - App home screen
  {t:9.38, text:"アプリ開いたら 私の家", section:"Verse", scene:"scene-home"},
  {t:12.2, text:"おかえりなさいが 出迎える", scene:"scene-home"},
  {t:14.94, text:"四つのボタンが 並んでる", scene:"scene-home"},
  {t:17.4, text:"シーンを選んで ワンタップで", scene:"scene-home"},
  // Tap actions - lifestyle backgrounds
  {t:19.78, text:"帰宅 タッ 鍵が開く 明かりつく", scene:"scene-tap", action:"home", bg:"bg-family"},
  {t:24.80, text:"外出 タッ 全部ロック 消灯だ", scene:"scene-tap", action:"away", bg:""},
  {t:29.88, text:"就寝 タッ あたたかい 暖色に", scene:"scene-tap", action:"sleep", bg:"bg-bedroom"},
  {t:34.64, text:"起床 タッ 朝の光 パッと差す", scene:"scene-tap", action:"wake", bg:""},
  // Pre-Chorus - Settings screen + product
  {t:39.68, text:"設定タブから デバイスを足す", section:"Pre-Chorus", scene:"scene-devices"},
  {t:42.52, text:"SwitchBot Sesame Hue", scene:"scene-product"},
  {t:44.40, text:"Nature Remo Nuki Qrio", scene:"scene-product"},
  {t:47.64, text:"全メーカー まとめて ひとつに", scene:"scene-devices"},
  // Chorus 1
  {t:50.54, text:"カチャッと開けば KAGI", section:"Chorus", scene:"scene-chorus"},
  {t:52.8, text:"家ごと まるごと てのひらに", scene:"scene-dashboard"},
  {t:55.14, text:"鍵も 照明も エアコンも", scene:"scene-chorus"},
  {t:57.5, text:"リズムに乗せて", scene:"scene-chorus"},
  {t:59.8, text:"カチャッと一発 KAGI", scene:"scene-chorus"},
  {t:62.86, text:"カチャッと閉めれば KAGI", scene:"scene-chorus"},
  {t:65.06, text:"どこでも 安心 つながってる", scene:"scene-dashboard"},
  {t:67.5, text:"二軒目 三軒目 増やせるよ", scene:"scene-chorus"},
  {t:69.5, text:"近い家 自動で 選んでくれる", scene:"scene-home"},
  // Verse 2 - Calendar
  {t:72.84, text:"カレンダー開けば 月が見える", section:"Verse 2", scene:"scene-calendar"},
  {t:75.56, text:"予約が入れば 色がつく", scene:"scene-calendar"},
  {t:78.18, text:"営業モード 三つある", scene:"scene-devices"},
  {t:80.2, text:"自宅 民泊 旅館業", scene:"scene-devices", bg:"bg-airbnb"},
  // Bridge
  {t:82.26, text:"暮らしの形は自由に選べる", section:"Bridge", scene:"scene-dashboard", bg:"bg-elderly"},
  {t:84.5, text:"予感も 思いやりの心も", scene:"scene-chorus", bg:""},
  {t:86.30, text:"アプリに込めて", scene:"scene-home"},
  {t:88.84, text:"見えないゲストへ 快適をパス", scene:"scene-chorus", bg:"bg-airbnb"},
  {t:91, text:"どんなシーンも迷わせない", scene:"scene-chorus", bg:""},
  // Chorus 2
  {t:93.48, text:"カチャッと開けば KAGI", section:"Chorus", scene:"scene-chorus"},
  {t:95.8, text:"ビジネスまるごと てのひらに", scene:"scene-dashboard"},
  {t:98.32, text:"清掃管理 売上レポート", scene:"scene-calendar"},
  {t:101, text:"スマートにこなす", scene:"scene-chorus"},
  {t:103.38, text:"カチャッと一発 KAGI", scene:"scene-chorus"},
  // Outro
  {t:109.12, text:"ただの鍵じゃない", section:"Outro", scene:"scene-product"},
  {t:112, text:"暮らしを開く扉のパスポート", scene:"scene-outro"},
  {t:119.22, text:"私のリラックスも 誰かの笑顔も", scene:"scene-outro", bg:"bg-elderly"},
  {t:123, text:"すべてはこの指先から", scene:"scene-outro", bg:""},
  {t:127.80, text:"カチャッ カチャッ カチャッと", scene:"scene-outro"},
  {t:131, text:"新しい日々へ", scene:"scene-outro"},
  {t:133.16, text:"開いた未来へ ウェルカム KAGI", scene:"scene-outro"},
  {t:141, text:"", scene:"scene-outro"},
];

const audio = document.getElementById('audio');
let isPlaying = false;

// Particles
const pEl = document.getElementById('particles');
for(let i=0;i<35;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(5+Math.random()*7)+'s';
  p.style.animationDelay=Math.random()*10+'s';
  p.style.width=p.style.height=(2+Math.random()*4)+'px';
  p.style.background=['#a78bfa','#60a5fa','#7c3aed','#c084fc','#fff'][Math.floor(Math.random()*5)];
  pEl.appendChild(p);
}

// Tap actions data
const taps = {
  home: {icon:'🏠', label:'帰宅モード', sub:'おかえりなさい', items:['🔓 解錠','💡 照明ON','❄️ エアコン起動']},
  away: {icon:'🔒', label:'外出モード', sub:'いってらっしゃい', items:['🔐 全ロック','💡 全消灯','📹 セキュリティON']},
  sleep:{icon:'🌙', label:'就寝モード', sub:'おやすみなさい', items:['🔐 施錠確認','💡 暖色10%','🪟 カーテン閉']},
  wake: {icon:'☀️', label:'起床モード', sub:'おはようございます', items:['🪟 カーテン開','💡 昼白色','☕ コーヒーON']}
};

// BG colors per scene
const bgColors = {
  'scene-home':'radial-gradient(ellipse at 50% 40%,#1a1040,#0a0a1a 60%,#000)',
  'scene-tap':'radial-gradient(ellipse at 50% 40%,#0f1a3a,#050a1a 60%,#000)',
  'scene-devices':'radial-gradient(ellipse at 50% 40%,#1a0f30,#0a0a1a 60%,#000)',
  'scene-chorus':'radial-gradient(ellipse at 50% 40%,#2a1055,#100a2a 50%,#000)',
  'scene-product':'radial-gradient(ellipse at 50% 40%,#0a1a1a,#050a0a 60%,#000)',
  'scene-calendar':'radial-gradient(ellipse at 50% 40%,#0a1530,#050a1a 60%,#000)',
  'scene-dashboard':'radial-gradient(ellipse at 50% 40%,#1a1040,#0a0a1a 60%,#000)',
  'scene-outro':'radial-gradient(ellipse at 50% 40%,#1a0a40,#0a0520 50%,#000)'
};

let curIdx=-1, curBg='';
function update(time) {
  let idx=-1;
  for(let i=lyrics.length-1;i>=0;i--) if(time>=lyrics[i].t){idx=i;break;}
  if(idx===curIdx) return;
  curIdx=idx;
  const L=lyrics[idx];

  // Scene
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  const scEl=document.getElementById(L.scene);
  if(scEl) scEl.classList.add('active');

  // BG gradient
  document.getElementById('bg').style.background=bgColors[L.scene]||bgColors['scene-home'];

  // Lifestyle BG
  const newBg = L.bg || '';
  if(newBg !== curBg) {
    document.querySelectorAll('.lifestyle-bg').forEach(b=>b.classList.remove('active'));
    if(newBg) document.getElementById(newBg)?.classList.add('active');
    curBg = newBg;
  }

  // Tap actions
  if(L.scene==='scene-tap' && L.action && taps[L.action]) {
    const t=taps[L.action];
    document.getElementById('tap-icon').textContent=t.icon;
    document.getElementById('tap-label').textContent=t.label;
    document.getElementById('tap-sub').textContent=t.sub;
    const al=document.getElementById('tap-actions');
    al.innerHTML=t.items.map((item,i)=>`<div class="tap-action-item" style="animation-delay:${i*.12}s">${item}</div>`).join('');
  }

  // Section
  if(L.section) document.getElementById('section-label').textContent=L.section;

  // Lyrics
  const lEl=document.getElementById('lyrics');
  let html='';
  for(let i=Math.max(0,idx-1);i<=Math.min(lyrics.length-1,idx+2);i++){
    if(!lyrics[i].text) continue;
    const c=i===idx?'active':i<idx?'past':'';
    html+=`<div class="lyric-line ${c}">${lyrics[i].text}</div>`;
  }
  lEl.innerHTML=html;
}

function togglePlay(){
  if(isPlaying){audio.pause();document.querySelector('.ctrl-btn').textContent='▶ 再生';}
  else{audio.play();document.querySelector('.ctrl-btn').textContent='⏸ 一時停止';}
  isPlaying=!isPlaying;
}

audio.addEventListener('timeupdate',()=>{
  const t=audio.currentTime,d=audio.duration||155;
  document.getElementById('progress').style.width=(t/d*100)+'%';
  const m=Math.floor(t/60),s=Math.floor(t%60),dm=Math.floor(d/60),ds=Math.floor(d%60);
  document.getElementById('time-display').textContent=`${m}:${String(s).padStart(2,'0')} / ${dm}:${String(ds).padStart(2,'0')}`;
  update(t);
});
audio.addEventListener('ended',()=>{isPlaying=false;document.querySelector('.ctrl-btn').textContent='▶ 再生';});

// Init
document.getElementById('scene-home').classList.add('active');
</script>
</body>
</html>
