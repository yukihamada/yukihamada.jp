// ── CANVAS PARTICLES ──
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const P=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;}
rsz();addEventListener('resize',rsz);

function sp(x,y,n,c,sz){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=1+Math.random()*5;P.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,l:1,c,s:sz||2+Math.random()*4});}}
function spG(n){sp(innerWidth*(.2+Math.random()*.6),innerHeight*(.2+Math.random()*.6),n,'255,215,0',3);}
function spP(n){sp(innerWidth*(.2+Math.random()*.6),innerHeight*(.3+Math.random()*.4),n,'255,143,163',4);}
function spW(n){sp(innerWidth/2,innerHeight/2,n,'255,248,231',2);}
// Cherry blossom petals (float down slowly)
function spPetal(){P.push({x:Math.random()*innerWidth,y:-20,vx:(Math.random()-.5)*1.5,vy:.5+Math.random(),l:1,c:'255,180,200',s:4+Math.random()*4,petal:true});}

let amb=0;
function drawP(){
  cx.clearRect(0,0,cv.width,cv.height);
  amb++;
  if(amb%8===0)spPetal(); // constant cherry blossom rain
  if(amb%40===0)sp(Math.random()*innerWidth,-10,1,'255,215,0',2); // gold sparkle

  for(let i=P.length-1;i>=0;i--){
    const p=P[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.petal){p.vx+=Math.sin(amb*.02+i)*.02;p.vy*=.999;p.l-=.003;}
    else{p.vy+=.04;p.vx*=.98;p.l-=.018;}
    if(p.l<=0||p.y>cv.height+20){P.splice(i,1);continue;}
    cx.globalAlpha=p.l*.7;
    cx.fillStyle=`rgba(${p.c},${p.l})`;
    cx.shadowColor=`rgba(${p.c},.4)`;cx.shadowBlur=6;
    if(p.petal){
      cx.save();cx.translate(p.x,p.y);cx.rotate(amb*.01+i);
      cx.fillStyle=`rgba(${p.c},${p.l*.6})`;
      cx.beginPath();cx.ellipse(0,0,p.s,p.s*.5,0,0,Math.PI*2);cx.fill();
      cx.restore();
    }else{
      cx.beginPath();cx.arc(p.x,p.y,p.s*p.l,0,Math.PI*2);cx.fill();
    }
  }
  cx.globalAlpha=1;cx.shadowBlur=0;
}

// ── EFFECTS ──
function flash(c,d){const f=document.getElementById('fl');f.style.background=c;f.style.opacity='.25';setTimeout(()=>f.style.opacity='0',d||100);}
function ring(){const r=document.getElementById('ring');r.style.transition='none';r.style.width='0';r.style.height='0';r.style.opacity='.5';r.style.borderColor='var(--gold)';
  requestAnimationFrame(()=>{r.style.transition='all .7s ease-out';r.style.width='350px';r.style.height='350px';r.style.opacity='0';});}
function shake(i){const d=[(Math.random()-.5)*i*5,(Math.random()-.5)*i*3];document.body.style.transform=`translate(${d[0]}px,${d[1]}px)`;setTimeout(()=>document.body.style.transform='',50);}

// ── LYRIC DISPLAY ──
let prevText='';
function showL(text,fx){
  const km=document.getElementById('km'),kp=document.getElementById('kp');
  // Show previous lyric fading above
  if(prevText&&prevText!=='♪'){kp.textContent=prevText;kp.classList.add('on');}
  else kp.classList.remove('on');
  setTimeout(()=>kp.classList.remove('on'),2000);
  prevText=text;

  km.classList.remove('on','pop','big');
  void km.offsetWidth;
  km.textContent=text;
  km.classList.add('on');

  if(fx==='p'){km.classList.add('pop');shake(.3);spW(6);}
  if(fx==='B'){km.classList.add('pop','big');flash('rgba(255,215,0,.2)',100);spG(30);spP(15);ring();shake(.6);}
  if(fx==='g'){km.classList.add('pop');flash('rgba(245,166,35,.15)',80);spG(12);shake(.2);}
}

// ── SCENE ──
function swSc(i){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.getElementById(SC[i].el).classList.add('on');
  cs=i;flash('rgba(255,215,0,.1)',150);spG(8);
}

// ── BEAT ──
let actx,anl,lb=0,bth=100;
// Build visualizer bars
const vizEl=document.getElementById('viz');
const BARS=48;
for(let i=0;i<BARS;i++){const b=document.createElement('div');b.className='vb';b.style.height='2px';vizEl.appendChild(b);}
const vizBars=[...vizEl.children];

function setupA(){actx=new(AudioContext||webkitAudioContext)();anl=actx.createAnalyser();anl.fftSize=256;anl.smoothingTimeConstant=.75;const s=actx.createMediaElementSource(au);s.connect(anl);anl.connect(actx.destination);}

// Auto-hide transport
let hideTimer=null;
function showTr(){document.getElementById('tr').style.opacity='1';clearTimeout(hideTimer);hideTimer=setTimeout(()=>{if(on)document.getElementById('tr').style.opacity='0';},3000);}
document.addEventListener('touchstart',showTr);document.addEventListener('mousemove',showTr);
function beat(){
  if(!anl)return;const f=new Uint8Array(anl.frequencyBinCount);anl.getByteFrequencyData(f);
  // Visualizer bars
  for(let i=0;i<BARS;i++){
    const idx=Math.floor(i*f.length/BARS);
    const v=f[idx]/255;
    vizBars[i].style.height=Math.max(2,v*45)+'px';
    vizBars[i].style.opacity=.3+v*.5;
  }
  // Beat detection
  let b=0;for(let i=0;i<10;i++)b+=f[i];b/=10;
  if(b>bth&&Date.now()-lb>180){lb=Date.now();spG(2+Math.floor(b/50));if(b>150)flash('rgba(255,215,0,.08)',40);}
  bth=bth*.94+b*.06*1.3;
}

// ── LOOP ──
function fmt(s){return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function lp(){
  requestAnimationFrame(lp);
  const t=au.currentTime,d=au.duration||253;
  document.getElementById('prog').style.width=(t/d*100)+'%';
  document.getElementById('sk').value=t;
  document.getElementById('td').textContent=fmt(t)+' / '+fmt(d);

  let si=0;for(let i=SC.length-1;i>=0;i--){if(t>=SC[i].t){si=i;break;}}
  if(si!==cs)swSc(si);

  let li=-1;for(let i=L.length-1;i>=0;i--){if(t>=L[i].t&&t<L[i].t+3.5){li=i;break;}}
  if(li!==cl){cl=li;if(li>=0)showL(L[li].x,L[li].f);else document.getElementById('km').classList.remove('on');}

  beat();drawP();
}

// ── CONTROLS ──
function go(){
  const o=document.getElementById('st');o.style.transition='opacity .4s';o.style.opacity='0';setTimeout(()=>o.style.display='none',400);
  au.src='assets/musubinaosu.mp3';setupA();au.play();on=true;document.getElementById('bp').textContent='⏸';requestAnimationFrame(lp);
  setTimeout(()=>{if(on)document.getElementById('tr').style.opacity='0';},3000);
}
function tog(){if(on){au.pause();on=false;document.getElementById('bp').textContent='▶';}else{au.play();on=true;document.getElementById('bp').textContent='⏸';}}
au.addEventListener('ended',()=>{on=false;document.getElementById('bp').textContent='▶';setTimeout(()=>document.getElementById('en').style.display='block',1500);});
