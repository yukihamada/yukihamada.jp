<script>
// --- Audio Analyzer ---
const audio = document.getElementById('audio');
let actx, analyser, dataArr, source;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = actx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.8;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  source = actx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(actx.destination);
}

// --- Visualizer Canvas (frequency bars) ---
const vizCanvas = document.getElementById('visualizer');
const vizCtx = vizCanvas.getContext('2d');

function resizeCanvases() {
  const w = window.innerWidth, h = window.innerHeight;
  vizCanvas.width = w; vizCanvas.height = h;
  partCanvas.width = w; partCanvas.height = h;
}

function drawVisualizer() {
  const w = vizCanvas.width, h = vizCanvas.height;
  vizCtx.clearRect(0, 0, w, h);
  if (!analyser || audio.paused) return;
  analyser.getByteFrequencyData(dataArr);

  const bars = 64;
  const barW = w / bars;
  const cx = w / 2;

  for (let i = 0; i < bars; i++) {
    const val = dataArr[Math.floor(i * dataArr.length / bars)] / 255;
    const barH = val * h * 0.4;
    const x = i * barW;
    const alpha = 0.08 + val * 0.15;

    const grad = vizCtx.createLinearGradient(x, h, x, h - barH);
    grad.addColorStop(0, `rgba(255,59,48,${alpha})`);
    grad.addColorStop(1, `rgba(255,149,0,${alpha * 0.3})`);
    vizCtx.fillStyle = grad;
    vizCtx.fillRect(x, h - barH, barW - 1, barH);
  }

  // Center circle pulse
  const avg = dataArr.reduce((a, b) => a + b, 0) / dataArr.length / 255;
  const r = 60 + avg * 120;
  const grd = vizCtx.createRadialGradient(cx, h * 0.42, 0, cx, h * 0.42, r);
  grd.addColorStop(0, `rgba(255,59,48,${avg * 0.15})`);
  grd.addColorStop(0.5, `rgba(255,149,0,${avg * 0.05})`);
  grd.addColorStop(1, 'transparent');
  vizCtx.fillStyle = grd;
  vizCtx.fillRect(cx - r, h * 0.42 - r, r * 2, r * 2);
}

// --- Particle System ---
const partCanvas = document.getElementById('particles');
const partCtx = partCanvas.getContext('2d');
const parts = [];

class Particle {
  constructor(x, y, burst) {
    this.x = x || Math.random() * partCanvas.width;
    this.y = y || Math.random() * partCanvas.height;
    this.vx = (Math.random() - 0.5) * (burst ? 3 : 0.3);
    this.vy = -Math.random() * (burst ? 4 : 1) - 0.2;
    this.life = burst ? 0.6 + Math.random() * 0.4 : 2 + Math.random() * 3;
    this.maxLife = this.life;
    this.size = burst ? 2 + Math.random() * 3 : 1 + Math.random() * 2;
    this.hue = Math.random() > 0.5 ? 10 : 30; // red or orange
  }
  update(dt) {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= dt;
    return this.life > 0;
  }
  draw(ctx) {
    const alpha = Math.min(1, this.life / this.maxLife * 0.6);
    ctx.fillStyle = `hsla(${this.hue},100%,60%,${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function spawnParticles(count, x, y) {
  for (let i = 0; i < count; i++) parts.push(new Particle(x, y, true));
}

let lastPart = 0;
function updateParticles(dt) {
  const w = partCanvas.width, h = partCanvas.height;
  partCtx.clearRect(0, 0, w, h);

  // Ambient particles from audio energy
  if (analyser && !audio.paused) {
    const avg = dataArr.reduce((a, b) => a + b, 0) / dataArr.length / 255;
    if (avg > 0.15 && parts.length < 200) {
      parts.push(new Particle());
    }
  }

  for (let i = parts.length - 1; i >= 0; i--) {
    if (!parts[i].update(dt)) { parts.splice(i, 1); continue; }
    parts[i].draw(partCtx);
  }
}

// --- Tap Ripple ---

  const ripple = document.createElement('div');

  ripple.style.left = e.clientX + 'px';
  ripple.style.top = e.clientY + 'px';
  document.getElementById('mv').appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
  spawnParticles(15, e.clientX, e.clientY);
});

let cur = -1;
let lastTime = performance.now();

function fmt(s) { const m = Math.floor(s/60); return m+':'+(('0'+Math.floor(s%60)).slice(-2)); }

function tick(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  const t = audio.currentTime;

  // Scene switch
  let idx = 0;
  for (let i = scenes.length - 1; i >= 0; i--) { if (t >= scenes[i][0]) { idx = i; break; } }
  if (idx !== cur) {
    cur = idx;
    const [, ly, sub, feat, vis] = scenes[idx];
    lyricsEl.innerHTML = ly;
    lyricsSub.textContent = sub;
    featureEl.innerHTML = feat;
    centerEl.innerHTML = vis;
    // Glow on chorus
    lyricsEl.classList.toggle('glow', ly.includes('Koe'));
    // Burst particles on scene change
    spawnParticles(8, partCanvas.width / 2, partCanvas.height * 0.4);
    dlBar.style.display = 'block';
  }

  // Progress + time
  if (audio.duration) {
    progressEl.style.width = (t / audio.duration * 100) + '%';
    timeEl.textContent = fmt(t) + ' / ' + fmt(audio.duration);
  }

  // Auto-hide nav during playback
  nav.classList.toggle('hidden', !audio.paused && t > 2 && t < 140);

  drawVisualizer();
  updateParticles(dt);

  if (!audio.paused) requestAnimationFrame(tick);
}

playBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (audio.paused) {
    initAudio();
    audio.play();
    playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    playBtn.classList.add('playing');
    lastTime = performance.now();
    requestAnimationFrame(tick);
  } else {
    audio.pause();
    playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Play';
    playBtn.classList.remove('playing');
  }
});

audio.addEventListener('ended', () => {
  playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Replay';
  playBtn.classList.remove('playing');
  dlBar.style.display = 'block';
  nav.classList.remove('hidden');
});

window.addEventListener('resize', resizeCanvases);
resizeCanvases();
</script>
