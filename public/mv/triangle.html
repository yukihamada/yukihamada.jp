<style>
:root{--bg:#0a0a0e;--accent:#4A90D9;--accent2:#7B68EE;--white:#fff;--dim:rgba(255,255,255,.5);--gold:#E8B64A;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:#fff;}

/* Progress bar - triangle themed blue */
#prog{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:9999;transition:width .1s linear;}

/* Scenes */
.scene{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;overflow:hidden;z-index:1;}
.scene.active{opacity:1;pointer-events:all;z-index:2;}
.scene.trans-fade{transition:opacity .6s;}
.scene.trans-cut{transition:opacity .08s;}
.scene.trans-slide{transition:opacity .3s,transform .5s;transform:translateX(100%);}
.scene.trans-slide.active{transform:translateX(0);}

.scene-bg{position:absolute;inset:-5%;background-size:cover;background-position:center;filter:brightness(.5) saturate(1.3);transform:scale(1);}
.scene.active .scene-bg{animation:kenpan 6s ease-in-out forwards;}
@keyframes kenpan{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.08) translate(-1%,-1%)}}
.scene.active:nth-child(3n+1) .scene-bg{animation-name:kenpan2;}
@keyframes kenpan2{0%{transform:scale(1.05) translate(1%,0)}100%{transform:scale(1) translate(-1%,1%)}}
.scene.active:nth-child(3n+2) .scene-bg{animation-name:kenpan3;}
@keyframes kenpan3{0%{transform:scale(1) translate(-1%,1%)}100%{transform:scale(1.06) translate(1%,-1%)}}
.scene-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,14,.15) 0%,rgba(10,10,14,.05) 40%,rgba(10,10,14,.45) 100%);transition:background .5s;}
.scene-overlay.vignette{background:radial-gradient(ellipse at center,rgba(10,10,14,0) 40%,rgba(10,10,14,.55) 100%);}
.scene-content{position:relative;z-index:10;text-align:center;padding:60px 24px 160px;max-width:800px;width:100%;}

/* Karaoke */
#karaoke{position:fixed;bottom:90px;left:0;right:0;z-index:6000;text-align:center;padding:0 20px;pointer-events:none;}
#k-main{font-size:clamp(1.3rem,4vw,2.2rem);font-weight:900;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8),0 0 30px var(--accent);line-height:1.6;opacity:0;transform:translateY(10px);transition:opacity .15s,transform .15s;}
#k-main.show{opacity:1;transform:translateY(0);}
#k-main .tech{color:var(--accent);font-weight:900;}
#k-main .step{color:var(--gold);font-weight:700;}

/* Big title */
#k-big{position:fixed;inset:0;z-index:6500;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s;padding:0 20px;}
#k-big.show{opacity:1;}
#k-big .text{font-size:clamp(1.8rem,7vw,4rem);font-weight:900;color:var(--accent);text-shadow:0 0 40px rgba(74,144,217,.5),0 0 80px rgba(74,144,217,.2);text-align:center;line-height:1.3;}

/* Annotation - technique explanation */
#annotation{position:fixed;bottom:55px;left:0;right:0;z-index:5900;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;padding:0 20px;}
#annotation.show{opacity:1;}
#annotation span{font-size:clamp(.6rem,2vw,.75rem);color:rgba(255,255,255,.4);background:rgba(0,0,0,.35);padding:3px 12px;border-radius:10px;backdrop-filter:blur(4px);}

/* Step indicator */
#step-indicator{position:fixed;top:12px;left:12px;z-index:9100;font-size:.65rem;color:var(--accent);opacity:0;transition:opacity .5s;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:8px;backdrop-filter:blur(6px);}
#step-indicator.show{opacity:1;}

/* Visualizer */
#viz{position:fixed;bottom:0;left:0;right:0;height:35px;z-index:40;pointer-events:none;display:flex;align-items:flex-end;justify-content:center;gap:2px;padding:0 10%;}
.vb{width:3px;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:2px 2px 0 0;opacity:.5;}
#cv{position:fixed;inset:0;z-index:50;pointer-events:none;}
#fl{position:fixed;inset:0;z-index:400;pointer-events:none;opacity:0;transition:opacity .05s;}

#transport{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;align-items:center;gap:14px;background:rgba(0,0,0,.7);border:1px solid rgba(74,144,217,.2);border-radius:30px;padding:8px 18px;backdrop-filter:blur(10px);opacity:1;transition:opacity .5s;}
#btn-play{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;}
#seek-bar{width:120px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;-webkit-appearance:none;}
#seek-bar::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
#time-display{font-size:11px;color:var(--dim);min-width:70px;text-align:center;font-variant-numeric:tabular-nums;}

/* Start overlay */
#start-overlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
#start-overlay .bg{position:absolute;inset:0;background:url('assets/images/generated/triangle/tri_title.jpg') center/cover;filter:brightness(.22) blur(6px);transform:scale(1.1);}
#start-overlay .content{position:relative;z-index:2;text-align:center;}
.so-hook{font-size:clamp(.75rem,2.2vw,.95rem);color:var(--dim);letter-spacing:.12em;margin-bottom:12px;}
.so-title{font-size:clamp(2rem,8vw,4.5rem);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.so-sub{font-size:clamp(.7rem,1.8vw,.85rem);color:var(--dim);margin-top:16px;letter-spacing:.15em;}
.so-credit{font-size:clamp(.6rem,1.5vw,.7rem);color:rgba(255,255,255,.3);margin-top:8px;}
.so-play{margin-top:24px;width:60px;height:60px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;margin-left:auto;margin-right:auto;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.7}}

/* Sensei quote */
#sensei-quote{position:fixed;top:15%;right:5%;z-index:5800;pointer-events:none;opacity:0;transition:opacity 1s;max-width:220px;text-align:right;}
#sensei-quote .q{font-size:.75rem;color:rgba(255,255,255,.25);font-style:italic;line-height:1.6;}
#sensei-quote .by{font-size:.6rem;color:rgba(74,144,217,.4);margin-top:4px;}

/* Triangle shape animation */
.triangle-shape{position:fixed;z-index:60;pointer-events:none;opacity:0;transition:opacity 1s;}
.triangle-shape svg{width:200px;height:200px;}
.triangle-shape.show{opacity:.15;}

/* End screen */
#end-screen{display:none;position:fixed;inset:0;z-index:9500;background:var(--bg);overflow-y:auto;}
#end-screen .inner{max-width:600px;margin:0 auto;padding:50px 24px 100px;text-align:center;}
.stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:20px 0;}
.stat{text-align:center;}
.stat .num{font-size:clamp(1.8rem,6vw,2.5rem);font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums;}
.stat .label{font-size:.65rem;color:var(--dim);margin-top:2px;}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:rgba(74,144,217,.15);border:1px solid var(--accent);border-radius:20px;color:var(--accent);text-decoration:none;font-size:.8rem;margin:4px;transition:background .2s;}
.share-btn:hover{background:rgba(74,144,217,.3);}
</style>

function rsz(){cv.width=innerWidth;cv.height=innerHeight;}
rsz();addEventListener('resize',rsz);
function sp(x,y,n,c,sz){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=1+Math.random()*4;P.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,l:1,c,s:sz||2+Math.random()*3});}}

// Triangle particle - special
function spTri(x,y){
  for(let i=0;i<3;i++){
    const angle=i*Math.PI*2/3-Math.PI/2;
    const ex=x+Math.cos(angle)*60,ey=y+Math.sin(angle)*60;
    for(let j=0;j<5;j++){
      const t=j/5;
      const nx=x+(ex-x)*t,ny=y+(ey-y)*t;
      P.push({x:nx,y:ny,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2-1,l:1.5,c:'74,144,217',s:3});
    }
  }
}

// Visualizer
const vizEl=document.getElementById('viz');
for(let i=0;i<48;i++){const b=document.createElement('div');b.className='vb';b.style.height='2px';vizEl.appendChild(b);}
const vizBars=[...vizEl.children];

let actx,anl;
function setupA(){actx=new(AudioContext||webkitAudioContext)();anl=actx.createAnalyser();anl.fftSize=256;anl.smoothingTimeConstant=.75;const s=actx.createMediaElementSource(audio);s.connect(anl);anl.connect(actx.destination);}

function flash(c,d){const f=document.getElementById('fl');f.style.background=c;f.style.opacity='.25';setTimeout(()=>f.style.opacity='0',d||100);}
function shake(i){document.body.style.transform=`translate(${(Math.random()-.5)*i*4}px,${(Math.random()-.5)*i*3}px)`;setTimeout(()=>document.body.style.transform='',60);}

let hideT;
function showTr(){document.getElementById('transport').style.opacity='1';clearTimeout(hideT);hideT=setTimeout(()=>{if(isPlaying)document.getElementById('transport').style.opacity='0';},3000);}
document.addEventListener('touchstart',showTr);document.addEventListener('mousemove',showTr);

function startPlay(){
  const ov=document.getElementById('start-overlay');
  ov.style.transition='opacity .4s';ov.style.opacity='0';
  setTimeout(()=>ov.style.display='none',400);
  audio.src=AUDIO_SRC;setupA();audio.play();isPlaying=true;
  document.getElementById('btn-play').textContent='\u23F8';
  requestAnimationFrame(loop);
  setTimeout(()=>{if(isPlaying)document.getElementById('transport').style.opacity='0';},3000);
}
function togglePause(){
  if(isPlaying){audio.pause();isPlaying=false;document.getElementById('btn-play').textContent='\u25B6';}
  else{audio.play();isPlaying=true;document.getElementById('btn-play').textContent='\u23F8';}
}
function fmt(s){return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

// === Lyric display ===
function showLyric(lyric){
  const kMain=document.getElementById('k-main');
  const kBig=document.getElementById('k-big');
  const ann=document.getElementById('annotation');
  const stepEl=document.getElementById('step-indicator');

  kMain.classList.remove('show');
  kBig.classList.remove('show');
  ann.classList.remove('show');

  if(!lyric) return;

  // BIG title
  if(lyric.h==='BIG'){
    void kBig.offsetWidth;
    kBig.querySelector('.text').innerHTML=lyric.big;
    kBig.classList.add('show');
    flash('rgba(74,144,217,.2)',150);
    spTri(innerWidth/2,innerHeight/2);
    return;
  }

  // TAP
  if(lyric.h==='TAP'){
    const tapText=['tap','tap','tap...'];
    let i=0;
    kMain.innerHTML='';kMain.classList.add('show');
    function nextTap(){
      if(i>=3)return;
      kMain.innerHTML+=(i>0?' ':'')+'<span class="tech">'+tapText[i]+'</span>';
      flash('rgba(255,255,255,.15)',60);shake(.3);
      sp(innerWidth*(.3+i*.2),innerHeight*.5,8,'74,144,217',3);
      i++;setTimeout(nextTap,300);
    }
    nextTap();
    return;
  }

  // Normal lyric
  void kMain.offsetWidth;
  kMain.innerHTML=lyric.h;
  kMain.classList.add('show');

  // Annotation
  if(lyric.a){
    setTimeout(()=>{
      document.getElementById('ann-text').textContent=lyric.a;
      ann.classList.add('show');
    },400);
    // Count technique steps
    stepCount++;
  }

  // Step indicator
  if(lyric.step){
    stepEl.textContent=lyric.step;
    stepEl.classList.add('show');
    setTimeout(()=>stepEl.classList.remove('show'),4000);
  }

  // Particles on technique words
  if(lyric.h.includes('tech')){
    sp(innerWidth/2,innerHeight*.7,6,'74,144,217',3);
  }
}

// === Sensei quotes ===
function checkQuotes(t){
  const sq=document.getElementById('sensei-quote');
  const sqt=document.getElementById('sq-text');
  let active=null;
  for(const q of QUOTES){
    if(t>=q.t&&t<q.t+8) active=q;
  }
  if(active){
    sqt.textContent='「'+active.q+'」';
    sq.style.opacity='1';
  } else {
    sq.style.opacity='0';
  }
}

// === Main loop ===
function loop(){
  if(!isPlaying&&audio.paused){requestAnimationFrame(loop);return;}
  const t=audio.currentTime;
  const dur=audio.duration||170;

  // Progress
  document.getElementById('prog').style.width=(t/dur*100)+'%';
  document.getElementById('seek-bar').value=t;
  document.getElementById('time-display').textContent=fmt(t)+' / '+fmt(dur);

  // Scenes
  let si=0;
  for(let i=SCENES.length-1;i>=0;i--){if(t>=SCENES[i].start){si=i;break;}}
  if(si!==curScene){
    const prev=document.getElementById(SCENES[curScene].el);
    const next=document.getElementById(SCENES[si].el);
    if(prev)prev.classList.remove('active');
    if(next){next.classList.add('active');
      const v=next.querySelector('video');
      if(v){v.currentTime=0;v.play().catch(()=>{});}
    }
    curScene=si;sceneCount++;
  }

  // Lyrics
  let li=-1;
  for(let i=L.length-1;i>=0;i--){if(t>=L[i].t){li=i;break;}}
  if(li!==curLyric){curLyric=li;showLyric(L[li]);}

  // Sensei quotes
  checkQuotes(t);

  // Audio visualizer
  if(anl){
    const d=new Uint8Array(anl.frequencyBinCount);
    anl.getByteFrequencyData(d);
    vizBars.forEach((b,i)=>{
      const v=d[Math.floor(i*d.length/vizBars.length)]||0;
      b.style.height=Math.max(2,v/8)+'px';
      b.style.opacity=.3+v/400;
    });
  }

  // Particles
  cx.clearRect(0,0,cv.width,cv.height);
  for(let i=P.length-1;i>=0;i--){
    const p=P[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.l-=.015;
    if(p.l<=0){P.splice(i,1);continue;}
    cx.globalAlpha=p.l;
    cx.fillStyle='rgba('+p.c+','+p.l+')';
    cx.beginPath();cx.arc(p.x,p.y,p.s,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;

  // End
  if(t>=dur-1&&dur>10){
    showEnd();return;
  }

  requestAnimationFrame(loop);
}

function showEnd(){
  audio.pause();isPlaying=false;
  const es=document.getElementById('end-screen');
  es.style.display='block';
  // Animate stats
  animNum('st-scenes',sceneCount);
  animNum('st-steps',stepCount);

  // Replay on tap
  let tc=0;
  es.addEventListener('click',()=>{tc++;if(tc>=3){es.style.display='none';audio.currentTime=0;audio.play();isPlaying=true;curScene=0;curLyric=-1;sceneCount=0;stepCount=0;requestAnimationFrame(loop);}});
}
function animNum(id,target){
  const el=document.getElementById(id);
  let c=0;const step=Math.max(1,Math.floor(target/20));
  const iv=setInterval(()=>{c+=step;if(c>=target){c=target;clearInterval(iv);}el.textContent=c;},30);
}
</script>
