<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Timeline Editor — それ恋じゃなく柔術でした</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;color:#fff;font-family:system-ui,sans-serif;padding:0;}
.top{position:sticky;top:0;z-index:100;background:#111;border-bottom:1px solid #333;padding:12px 16px;}
.top h1{font-size:1rem;color:#E8B64A;}
.controls{display:flex;gap:10px;align-items:center;margin-top:8px;}
.controls button{background:#E8B64A;color:#111;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-weight:700;font-size:.8rem;}
.controls button:hover{background:#d4a03a;}
#time-display{font-family:monospace;font-size:1.2rem;color:#E8B64A;min-width:80px;}
#seek{flex:1;height:4px;-webkit-appearance:none;background:#333;border-radius:2px;cursor:pointer;}
#seek::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#E8B64A;}

/* Timeline */
.timeline{padding:16px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.75rem;}
th{text-align:left;padding:6px 8px;color:#888;border-bottom:1px solid #333;position:sticky;top:80px;background:#111;z-index:10;}
td{padding:5px 8px;border-bottom:1px solid #1a1a1a;vertical-align:middle;}
tr.active{background:rgba(232,182,74,.1);}
tr:hover{background:rgba(255,255,255,.03);}
.t{font-family:monospace;color:#E8B64A;white-space:nowrap;min-width:50px;}
.lyric{color:#ccc;max-width:280px;}
.media-cell{display:flex;align-items:center;gap:6px;}
.media-cell img,.media-cell video{height:50px;border-radius:4px;border:1px solid #333;}
.type-badge{font-size:.6rem;padding:1px 5px;border-radius:4px;font-weight:700;}
.type-badge.vid{background:rgba(232,134,58,.2);color:#E8B64A;border:1px solid rgba(232,134,58,.3);}
.type-badge.img{background:rgba(100,100,100,.2);color:#888;border:1px solid rgba(100,100,100,.3);}
.section-header td{background:#1a1a1a;color:#E8B64A;font-weight:700;font-size:.8rem;border-bottom:2px solid #E8B64A;}
</style>
  <script defer src="https://enabler-analytics.fly.dev/t.js"></script>
</head>
<body>

<div class="top">
  <h1>Timeline — それ恋じゃなく柔術でした</h1>
  <div class="controls">
    <button id="btn-play" onclick="togglePlay()">▶ Play</button>
    <span id="time-display">0:00</span>
    <input type="range" id="seek" min="0" max="258" step="0.5" value="0" oninput="seekTo(this.value)">
    <span style="color:#888;font-size:.75rem;" id="dur">4:18</span>
  </div>
</div>

<div class="timeline">
<table>
<thead>
<tr><th>Time</th><th>歌詞</th><th>メディア</th><th>Type</th><th>ファイル</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<audio id="audio" src="assets/jiujitsu.mp3" preload="auto"></audio>

// Media timeline — synced to lyrics

// Build table
const tbody=document.getElementById('tbody');
let lastSection='';
MEDIA.forEach((m,i)=>{
  const [sec,time,type,file,desc]=m;
  // Section header
  if(sec && sec!==lastSection){
    const hr=document.createElement('tr');
    hr.className='section-header';
    hr.innerHTML=`<td colspan="5">${sec}</td>`;
    tbody.appendChild(hr);
    lastSection=sec;
  }
  const tr=document.createElement('tr');
  tr.dataset.time=time;
  tr.id='row-'+i;
  const min=Math.floor(time/60);
  const s=(time%60).toFixed(1);
  const path=type==='vid'?'assets/video/'+file:'assets/images/generated/'+file;
  const thumb=type==='vid'
    ?`<video src="${path}" muted preload="metadata" style="height:50px;border-radius:4px;border:1px solid #333;"></video>`
    :`<img src="${path}" style="height:50px;border-radius:4px;border:1px solid #333;">`;
  const badge=type==='vid'?'<span class="type-badge vid">VIDEO</span>':'<span class="type-badge img">IMG</span>';

  // Find matching lyric
  let lyric='';
  for(let j=LYRICS.length-1;j>=0;j--){
    if(LYRICS[j].t<=time){lyric=LYRICS[j].x;break;}
  }

  tr.innerHTML=`<td class="t">${min}:${s.padStart(4,'0')}</td><td class="lyric">${lyric}</td><td class="media-cell">${thumb} ${desc}</td><td>${badge}</td><td style="color:#555;font-size:.65rem;">${file}</td>`;
  tr.style.cursor='pointer';
  tr.onclick=()=>seekTo(time);
  tbody.appendChild(tr);
});

// Audio
const audio=document.getElementById('audio');
let playing=false;
function togglePlay(){
  if(playing){audio.pause();playing=false;document.getElementById('btn-play').textContent='▶ Play';}
  else{audio.play();playing=true;document.getElementById('btn-play').textContent='⏸ Pause';raf();}
}
function seekTo(t){audio.currentTime=parseFloat(t);document.getElementById('seek').value=t;updateHighlight();}
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function updateHighlight(){
  const ct=audio.currentTime;
  document.getElementById('time-display').textContent=fmt(ct);
  document.getElementById('seek').value=ct;
  // Highlight current row
  let activeIdx=0;
  for(let i=MEDIA.length-1;i>=0;i--){
    if(ct>=MEDIA[i][1]){activeIdx=i;break;}
  }
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('active'));
  const row=document.getElementById('row-'+activeIdx);
  if(row){row.classList.add('active');}
}
function raf(){
  if(!playing)return;
  updateHighlight();
  requestAnimationFrame(raf);
}
audio.addEventListener('ended',()=>{playing=false;document.getElementById('btn-play').textContent='▶ Play';});
</script>
</body>
</html>
