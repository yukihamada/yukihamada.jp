app = "yukihamada-jp"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[env]
  BASE_URL = "https://yukihamada.jp"
  RUST_LOG = "info"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
